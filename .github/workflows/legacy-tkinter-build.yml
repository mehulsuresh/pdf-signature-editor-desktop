name: Build Legacy Tkinter App

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "legacy/tkinter-app/**"
      - ".github/workflows/legacy-tkinter-build.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: legacy/tkinter-app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        working-directory: legacy/tkinter-app
        run: pyinstaller --noconfirm --clean --windowed --name SignCanvasPDF app.py

      - name: Archive build output
        uses: actions/upload-artifact@v4
        with:
          name: signcanvas-legacy-windows
          path: legacy/tkinter-app/dist/SignCanvasPDF/
