name: Build SignCanvas Desktop

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "apps/signcanvas-editor/**"
      - ".github/workflows/signcanvas-desktop-builds.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  build:
    name: ${{ matrix.label }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            platform: windows-latest
            args: ""
          - label: Ubuntu
            platform: ubuntu-22.04
            args: ""
          - label: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rustTargets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - label: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rustTargets: "aarch64-apple-darwin,x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with macOS targets
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/signcanvas-editor/src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/signcanvas-editor
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "signcanvas-[platform]-[arch]-[bundle]"
